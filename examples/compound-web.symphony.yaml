repository:
  remote: git@github.com:pennywise-investments/compound-web.git
tracker:
  kind: linear
  endpoint: https://api.linear.app/graphql
  api_key: $LINEAR_API_KEY
  project_slug: 434f2b9745b1
  active_states:
    - Ready for Agent
    - In Progress
  needs_info_state: Needs Info
  terminal_states:
    - Done
    - Canceled
    - Cancelled
    - Duplicate
polling:
  interval_ms: 30000
workspace:
  root: .symphony/workspaces
  base_branch: develop
hooks:
  timeout_ms: 120000
  before_run: bun run symphony:doctor
  after_run: git diff --check
agent:
  prompt_path: compound-web.symphony.agent.md
  max_concurrent_agents: 1
  max_retry_backoff_ms: 300000
runtime:
  provider: pi_cli
review:
  guidance: |
    Compound Web domain review policy:
    - REVIEW_FAIL direct data writes or database/schema/seed changes that bypass documented domain flows or lack migration, seed, and test evidence.
    - REVIEW_FAIL auth, onboarding, invitation, KYC, payment, document, customer, or dashboard changes without evidence against repository domain docs and production flows.
    - REVIEW_FAIL changes that use non-authoritative domain sources or weaken tenant, security, or ownership boundaries.
budgets:
  wall_clock: 2h
  max_tokens: 0
  max_cost: 0
  command_timeout: 10m
  runtime_timeout: 90m
  review_timeout: 30m
  merge_timeout: 10m
  github_timeout: 2m
compound:
  handoff_state: Human Review
  running_state: In Progress
  needs_info_state: Needs Info
  done_state: Done
  auto_merge: false
  required_validation:
    - bun run agent:status
    - bun run repo:check
