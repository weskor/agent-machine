repository:
  remote: git@github.com:weskor/pi-symphony.git
tracker:
  kind: linear
  endpoint: https://api.linear.app/graphql
  api_key: $LINEAR_API_KEY
  project_slug: c08e7f84bb75
  active_states:
    - Ready for Agent
    - In Progress
  needs_info_state: Needs Info
  terminal_states:
    - Done
    - Canceled
    - Cancelled
    - Duplicate
polling:
  interval_ms: 30000
workspace:
  root: .symphony/workspaces
  base_branch: main
hooks:
  timeout_ms: 120000
  before_run: mise exec go -- go test ./...
  after_run: mise exec go -- go test ./... && git diff --check
agent:
  prompt_path: symphony.agent.md
  max_concurrent_agents: 1
  max_retry_backoff_ms: 300000
runtime:
  provider: codex_cli
review:
  guidance: |
    Keep changed files scoped to Pi Symphony runner code, tests, configuration examples, and runner documentation.
    For runner behavior changes, verify behavior-contract evidence against docs/specs/ and docs/adr/.
budgets:
  wall_clock: 2h
  max_tokens: 0
  max_cost: 0
  command_timeout: 10m
  runtime_timeout: 90m
  review_timeout: 45m
  merge_timeout: 10m
  github_timeout: 2m
github:
  app_slug: pi-symphony-bot
workflow:
  handoff_state: Human Review
  running_state: In Progress
  needs_info_state: Needs Info
  done_state: Done
  auto_merge: false
  required_validation:
    - mise exec go -- go test ./...
    - git diff --check
